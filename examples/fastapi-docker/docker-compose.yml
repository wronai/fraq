version: '3.8'

services:
  fraq-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FRAQ_DIMS=3
      - FRAQ_SEED=0
    volumes:
      # Mount host filesystem for file search
      - /home:/host/home:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
